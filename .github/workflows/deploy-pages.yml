name: Deploy Expo Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Expo web dependencies
        run: |
          npm install --no-save react-dom@19.2.3 react-native-web@^0.21.2
          npm ls react-dom react-native-web

      - name: Export Expo web
        run: npx expo export --platform web

      - name: Prepare files for GitHub Pages subpath
        run: |
          # Ensure Pages serves folders like _expo
          touch dist/.nojekyll
          # SPA fallback for deep links
          cp dist/index.html dist/404.html
          # Expo export writes absolute paths (/...), convert to relative for /APP-SIZE/
          sed -i 's|href="/|href="./|g' dist/index.html
          sed -i 's|src="/|src="./|g' dist/index.html
          sed -i 's|href="/|href="./|g' dist/404.html
          sed -i 's|src="/|src="./|g' dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          force_orphan: true
